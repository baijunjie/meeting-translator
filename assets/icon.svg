<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 单一图标母版：满版出血（背景渐变铺满整 1024）。各平台在生成脚本里做各自取景：
       - iOS（apps/ios/scripts/gen-icons.mjs）：直接满版用，圆角由系统加。
       - macOS（apps/macos/scripts/gen-icon.mjs）：缩进 848 + 圆角 + 居中于 1024 透明画布
         （留 88 边给阴影），符合 Big Sur 图标网格。
       文字用基线定位（不用 dominant-baseline），保证 sharp/resvg 与浏览器渲染一致、不偏移。 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0DC"/>
      <stop offset="0.55" stop-color="#FFD8C6"/>
      <stop offset="1" stop-color="#FFB9C9"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.32" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#FF8DA1"/>
      <stop offset="1" stop-color="#FF5C7E"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#FFD36E"/>
      <stop offset="1" stop-color="#FFB638"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#C9555F" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- full-bleed warm background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>

  <g transform="translate(512 512) scale(1.12) translate(-512 -512)">
    <!-- back bubble (A, sunny) upper-right -->
    <g filter="url(#drop)">
      <path d="M 574 196 h 204 a 86 86 0 0 1 86 86 v 128 a 86 86 0 0 1 -86 86
               h -2 l 4 64 -58 -64 h -148 a 86 86 0 0 1 -86 -86
               v -128 a 86 86 0 0 1 86 -86 z" fill="url(#sun)"/>
      <rect x="510" y="214" width="332" height="120" rx="60" fill="url(#gloss)"/>
    </g>
    <text x="668" y="420" font-family="Arial Rounded Bold, Arial Rounded MT Bold, sans-serif"
          font-size="206" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>

    <!-- front bubble (文, coral) lower-left, overlapping -->
    <g filter="url(#drop)">
      <path d="M 280 388 h 280 a 96 96 0 0 1 96 96 v 152 a 96 96 0 0 1 -96 96
               h -226 l -78 86 6 -86 h -2 a 96 96 0 0 1 -96 -96
               v -152 a 96 96 0 0 1 96 -96 z" fill="url(#coral)"/>
      <rect x="206" y="408" width="402" height="130" rx="65" fill="url(#gloss)"/>
    </g>
    <text x="408" y="660" font-family="Hiragino Sans GB, PingFang SC, STHeiti, sans-serif"
          font-size="248" font-weight="600" fill="#FFFFFF" text-anchor="middle">文</text>

    <!-- cute sparkles -->
    <g fill="#FFFFFF">
      <path d="M 250 250 q 12 38 50 50 q -38 12 -50 50 q -12 -38 -50 -50 q 38 -12 50 -50 z" opacity="0.9"/>
      <path d="M 790 640 q 8 26 34 34 q -26 8 -34 34 q -8 -26 -34 -34 q 26 -8 34 -34 z" opacity="0.85"/>
    </g>
  </g>
</svg>
