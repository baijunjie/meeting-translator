# 构建 apps/web（浏览器 PWA）并部署到 GitHub Pages。
# Pages 项目站点服务于 https://<user>.github.io/<repo>/，故 base 设为 /<repo>/。
# 仓库 Settings → Pages → Build and deployment → Source 需选「GitHub Actions」。
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {} # 可在任意分支手动触发（合并到 main 前先验证用）

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署，新触发取消进行中的。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 只装 @mt/web 子图（@mt/core / @mt/ui + 其依赖），跳过 macOS/iOS 的 electron 等重依赖。
      - run: pnpm install --frozen-lockfile --filter "@mt/web..."

      - name: Build (base = /<repo>/)
        run: pnpm --filter @mt/web build
        env:
          # GitHub Pages 项目站点的子路径；与仓库名一致。
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - id: deploy
        uses: actions/deploy-pages@v4
