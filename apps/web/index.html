<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale/user-scalable：阻止 iOS 聚焦输入框时的自动放大；
       浏览器内 Safari 仍会保留用户主动捏合缩放（无障碍），独立 PWA 下则完全锁定视口。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FF5C7E" />
  <!-- 前导 / 的 public 资源，Vite 构建时会按 base 重写（GitHub Pages 子路径下也能命中） -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Realtime Translator</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
